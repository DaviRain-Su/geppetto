name: upstream-check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read

jobs:
  check-upstreams:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run upstream diff check
        run: |
          mkdir -p dist
          bun run upstream:check -- --json | tee dist/upstream-diff.json

      - name: Upload upstream check result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: upstream-diff-report
          path: dist/upstream-diff.json
