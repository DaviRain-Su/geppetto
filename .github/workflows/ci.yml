name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  node-release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NPM_CONFIG_CACHE: /tmp/npm-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run release gate
        run: npm run release:check

  rust-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --all-features

      - name: Run Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      - name: Build docs
        run: cargo doc --no-deps

  escrow-example:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run escrow example tests
        run: cargo test --manifest-path examples/escrow/Cargo.toml --all-features

  escrow-client-alignment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NPM_CONFIG_CACHE: /tmp/npm-cache
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run escrow client alignment
        run: npm run test:escrow-client-alignment
